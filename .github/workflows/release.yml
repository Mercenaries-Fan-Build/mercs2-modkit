name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Strips maintainer-only UI (e.g. the reference-manifest card) from pipeline
# release builds. Local `tauri dev`/`tauri build` leave it unset, so it shows.
env:
  VITE_RELEASE_BUILD: "true"

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export VERSION="${GITHUB_REF_NAME#v}"
            echo "Stamping build with version $VERSION"
            node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          else
            echo "Not a tag build; keeping version from tauri.conf.json"
          fi

      - name: Build Tauri app (Linux x64)
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercs2-modkit-linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/mercs2-modkit
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Attach to GitHub release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  flatpak:
    needs: linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Flatpak bundle version: $VERSION"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: mercs2-modkit-linux-x86_64
          path: artifacts

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Stage .deb next to the manifest
        run: |
          deb=$(find artifacts -name '*.deb' | head -n1)
          test -n "$deb" || { echo "No .deb found in artifacts"; exit 1; }
          cp "$deb" src-tauri/flatpak/app.deb

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            build-dir src-tauri/flatpak/com.mercenaries_fan_build.modkit.yml
          flatpak build-bundle repo "mercs2-modkit-${VERSION}-x86_64.flatpak" \
            com.mercenaries_fan_build.modkit

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercs2-modkit-linux-flatpak
          path: mercs2-modkit-${{ env.VERSION }}-x86_64.flatpak
          if-no-files-found: error

      - name: Attach to GitHub release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mercs2-modkit-${{ env.VERSION }}-x86_64.flatpak

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export VERSION="${GITHUB_REF_NAME#v}"
            echo "Stamping build with version $VERSION"
            node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          else
            echo "Not a tag build; keeping version from tauri.conf.json"
          fi

      - name: Build Tauri app (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercs2-modkit-windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/mercs2-modkit.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Attach to GitHub release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/mercs2-modkit.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
