name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercs2-modkit-windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/mercs2-modkit.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Attach to GitHub release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/mercs2-modkit.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
