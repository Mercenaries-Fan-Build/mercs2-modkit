name: CI

# Regression gate for pull requests (and pushes to main): the frontend must
# type-check and build, and the Rust backend must pass clippy (no warnings) and
# its unit tests. Release packaging lives in release.yml.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `npm run build` == `vue-tsc --noEmit && vite build`.
      - run: npm run build

  rust:
    name: Backend (clippy + tests)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri's Linux build links against webkit2gtk/gtk; required even to
      # compile the lib for clippy and tests.
      - name: Install system dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential

      # Compiles lib, bins, examples, and tests; fails on any warning.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test
